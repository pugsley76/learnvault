name: Frontend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"  # <--- CRITICAL: ADD THIS
      - "vite.config.ts"
      - "tsconfig*.json"
      - "eslint.config.js"

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # We are REMOVING the cache line temporarily to force a clean download
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps  # <--- Added flag for stability

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:frontend

      - name: Build
        run: npm run build